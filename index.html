<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>rawdog · intuitive focus</title>
  
  <link rel="manifest" href="data:application/manifest+json,{name:'rawdog',short_name:'rawdog',theme_color:'%23f5f5f7',background_color:'%23f5f5f7',display:'standalone',scope:'/',start_url:'/'}">
  <meta name="theme-color" content="#f5f5f7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  
  <script src="https://unpkg.com/feather-icons"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      --accent: #007aff;
      --accent-light: #e8f0fe;
      --text-primary: #1d1d1f;
      --text-secondary: #6e6e73;
      --card-bg: rgba(255, 255, 255, 0.75);
      --glass-border: rgba(255, 255, 255, 0.5);
      --progress-bg: #e6e6e8;
      --input-bg: rgba(255, 255, 255, 0.5);
      --delete-hover: #ff3b30;
      --shadow-card: 0 20px 40px rgba(0, 0, 0, 0.08), 0 0 0 0.5px rgba(0, 0, 0, 0.05);
      
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro Display', 'Helvetica Neue', sans-serif;
      padding: 1.5rem;
      margin: 0;
      color: var(--text-primary);
      background: linear-gradient(-45deg, #f0f4fa, #e6ecf5, #f5f7fb, #eaf0f8);
      background-size: 400% 400%;
      animation: liquidMove 20s ease infinite;
      position: relative;
      -webkit-font-smoothing: antialiased;
      transition: background 0.3s, color 0.2s;
    }

    body::before {
      content: '';
      position: fixed;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      background: radial-gradient(circle at 30% 40%, rgba(0, 122, 255, 0.06) 0%, transparent 40%),
                  radial-gradient(circle at 80% 70%, rgba(90, 170, 255, 0.05) 0%, transparent 50%);
      animation: orbFloat 28s infinite alternate ease-in-out;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes liquidMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @keyframes orbFloat {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(-3%, -2%) scale(1.02); }
    }

    body.dark {
      --accent: #0a84ff;
      --accent-light: rgba(10, 132, 255, 0.15);
      --text-primary: #ffffff;
      --text-secondary: #98989e;
      --card-bg: rgba(28, 28, 30, 0.7);
      --glass-border: rgba(255, 255, 255, 0.1);
      --progress-bg: #3a3a3c;
      --input-bg: rgba(44, 44, 46, 0.5);
      --delete-hover: #ff453a;
      --shadow-card: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 0 0.5px rgba(255, 255, 255, 0.08);
      
      background: linear-gradient(-45deg, #0c111a, #101824, #0a101c, #0e1622);
      background-size: 400% 400%;
    }
    body.dark::before {
      background: radial-gradient(circle at 30% 40%, rgba(0, 122, 255, 0.08) 0%, transparent 40%),
                  radial-gradient(circle at 80% 70%, rgba(100, 180, 255, 0.06) 0%, transparent 50%);
    }

    .app-card {
      max-width: 680px;
      width: 100%;
      background: var(--card-bg);
      backdrop-filter: blur(30px) saturate(200%);
      -webkit-backdrop-filter: blur(30px) saturate(200%);
      border-radius: 36px;
      box-shadow: var(--shadow-card);
      padding: 2.5rem 2.2rem;
      transition: box-shadow 0.3s ease, transform 0.3s ease;
      border: 0.5px solid var(--glass-border);
      animation: cardFloat 6s infinite alternate ease-in-out;
      position: relative;
      z-index: 10;
    }

    @keyframes cardFloat {
      0% { transform: translateY(0px); }
      100% { transform: translateY(-4px); }
    }

    .app-card::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      border-radius: 36px 36px 0 0;
      pointer-events: none;
    }

    .app-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }

    h1 {
      font-weight: 600;
      font-size: 2.6rem;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      display: flex;
      align-items: baseline;
      gap: 0.2rem;
      text-shadow: 0 2px 8px rgba(0,0,0,0.02);
    }
    .rawdog-emoji {
      font-size: 2.2rem;
      margin-left: 4px;
    }

    .badge {
      background: var(--accent-light);
      padding: 0.25rem 1rem;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--accent);
      backdrop-filter: blur(10px);
      border: 0.5px solid var(--glass-border);
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.8rem;
    }
    .greeting {
      font-size: 1rem;
      font-weight: 400;
      color: var(--text-secondary);
    }
    .streak-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      background: transparent;
      padding: 0.2rem 0;
      font-weight: 500;
      position: relative;
    }
    .streak-number {
      font-weight: 600;
      font-size: 1.2rem;
      color: var(--accent);
    }
    .streak-message {
      font-size: 0.9rem;
      color: var(--text-secondary);
    }
    .streak-info {
      margin-left: 4px;
      cursor: help;
      opacity: 0.6;
    }

    .progress-section {
      margin-bottom: 2rem;
    }
    .progress-header {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 6px;
      letter-spacing: -0.01em;
    }
    .progress-track {
      height: 4px;
      background: var(--progress-bg);
      border-radius: 4px;
      overflow: hidden;
      backdrop-filter: blur(5px);
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--accent);
      border-radius: 4px;
      transition: width 0.3s cubic-bezier(0.2, 0.9, 0.4, 1);
      box-shadow: 0 0 6px var(--accent);
    }

    .checklist {
      list-style: none;
      margin: 0.5rem 0 2rem;
    }
    .task-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.9rem 0.6rem;
      border-bottom: 0.5px solid var(--glass-border);
      transition: background 0.15s;
      border-radius: 16px;
    }
    .task-item:hover {
      background: rgba(128, 128, 128, 0.04);
    }

    .checkbox-custom {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      background: var(--input-bg);
      backdrop-filter: blur(8px);
      border-radius: 6px;
      border: 1.5px solid var(--text-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s ease;
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
    }
    .checkbox-custom.checked {
      background: var(--accent);
      border-color: var(--accent);
    }
    .checkbox-custom svg {
      width: 16px;
      height: 16px;
      stroke: white;
      stroke-width: 3;
      display: none;
    }
    .checkbox-custom.checked svg {
      display: block;
    }

    .task-content {
      flex: 1;
      font-size: 1.15rem;
      font-weight: 400;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-primary);
      padding: 0.2rem 0;
      transition: color 0.2s;
      word-break: break-word;
    }
    .task-content:focus {
      border-bottom: 1.5px solid var(--accent);
    }
    .task-item.completed .task-content {
      text-decoration: line-through;
      color: var(--text-secondary);
    }

    .task-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .edit-icon {
      opacity: 0.4;
      transition: opacity 0.2s;
      cursor: pointer;
      color: var(--text-secondary);
      position: relative;
    }
    .edit-icon:hover { opacity: 0.8; }
    .edit-icon::after {
      content: "Click text to edit";
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      color: var(--text-primary);
      padding: 4px 8px;
      border-radius: 8px;
      font-size: 0.7rem;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      box-shadow: var(--shadow-card);
      border: 0.5px solid var(--glass-border);
    }
    .edit-icon:hover::after {
      opacity: 1;
    }
    .delete-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 6px;
      border-radius: 30px;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.5;
    }
    .delete-btn:hover {
      opacity: 1;
      color: var(--delete-hover);
    }

    .empty-state {
      padding: 2.5rem 0.5rem;
      text-align: center;
      color: var(--text-secondary);
      font-size: 1rem;
    }
    .empty-state strong {
      color: var(--accent);
      font-weight: 500;
    }

    .add-section {
      display: flex;
      gap: 0.8rem;
      margin: 1rem 0 2rem;
    }
    .add-input {
      flex: 1;
      background: var(--input-bg);
      backdrop-filter: blur(12px);
      border: 0.5px solid var(--glass-border);
      border-radius: 18px;
      padding: 1rem 1.2rem;
      font-size: 16px;
      color: var(--text-primary);
      outline: none;
      transition: border 0.2s, box-shadow 0.2s;
      font-weight: 400;
    }
    .add-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.15);
    }
    .add-input::placeholder {
      color: var(--text-secondary);
    }

    .btn {
      background: var(--accent);
      border: none;
      color: white;
      font-weight: 500;
      padding: 1rem 1.8rem;
      border-radius: 40px;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      box-shadow: 0 2px 8px rgba(0, 122, 255, 0.2);
      backdrop-filter: blur(5px);
      letter-spacing: -0.01em;
    }
    .btn:hover {
      background: #005bbf;
      transform: scale(1.02);
      box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3);
    }
    body.dark .btn {
      background: #0a84ff;
    }
    body.dark .btn:hover {
      background: #0066d9;
    }

    .btn-secondary {
      background: var(--input-bg);
      backdrop-filter: blur(12px);
      color: var(--text-primary);
      padding: 0.6rem 1.2rem;
      border: 0.5px solid var(--glass-border);
      box-shadow: 0 2px 6px rgba(0,0,0,0.04);
      font-weight: 400;
    }
    .btn-secondary:hover {
      background: rgba(128, 128, 128, 0.08);
      transform: scale(1.01);
    }

    .action-bar {
      display: flex;
      gap: 0.8rem;
      justify-content: space-between;
      flex-wrap: wrap;
    }
    .action-group {
      display: flex;
      gap: 0.5rem;
    }

    .footer-bar {
      margin-top: 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.75rem;
      color: var(--text-secondary);
      border-top: 0.5px solid var(--glass-border);
      padding-top: 1.2rem;
    }
    .footer-actions button {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 0.75rem;
      cursor: pointer;
      text-decoration: none;
      opacity: 0.8;
      padding: 0 4px;
      transition: opacity 0.2s;
    }
    .footer-actions button:hover {
      opacity: 1;
      color: var(--accent);
    }

    .toast-message {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--card-bg);
      backdrop-filter: blur(30px);
      color: var(--text-primary);
      padding: 12px 24px;
      border-radius: 40px;
      box-shadow: var(--shadow-card);
      z-index: 999;
      border: 0.5px solid var(--glass-border);
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .toast-message button {
      background: none;
      border: none;
      color: var(--accent);
      font-weight: 500;
      cursor: pointer;
    }

    .pull-hint {
      text-align: center;
      margin-top: 10px;
      font-size: 0.7rem;
      color: var(--text-secondary);
      opacity: 0.6;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    /* Tooltip for streak */
    .tooltip-trigger {
      position: relative;
    }
    .tooltip-trigger:hover::after {
      content: "Complete all tasks daily to build a streak";
      position: absolute;
      bottom: 150%;
      left: 50%;
      transform: translateX(-50%);
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      color: var(--text-primary);
      padding: 6px 12px;
      border-radius: 12px;
      font-size: 0.75rem;
      white-space: nowrap;
      box-shadow: var(--shadow-card);
      border: 0.5px solid var(--glass-border);
      pointer-events: none;
      z-index: 100;
    }
  </style>
</head>
<body>
<div class="app-card">
  <div class="app-header">
    <h1>rawdog <span class="rawdog-emoji">⚡</span></h1>
    <div class="badge">no excuses</div>
  </div>

  <div class="status-row">
    <div class="greeting" id="greetingMsg">get it done</div>
    <div class="streak-pill tooltip-trigger">
      <span>🔥</span>
      <span class="streak-number" id="streakValue">0</span>
      <span class="streak-message" id="streakContext"></span>
      <span class="streak-info" title="Complete all tasks daily to build a streak"><i data-feather="info" width="14" height="14"></i></span>
    </div>
  </div>

  <div class="progress-section">
    <div class="progress-header">
      <span id="progressText">ready</span>
      <span id="progressPercent">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <ul class="checklist" id="checklistContainer"></ul>

  <div class="add-section">
    <input type="text" id="newTaskInput" class="add-input" placeholder="What are you avoiding?" autocomplete="off" />
    <button class="btn" id="addTaskBtn"><i data-feather="plus"></i> Add</button>
  </div>

  <div class="action-bar">
    <div class="action-group">
      <button class="btn btn-secondary" id="resetDailyBtn" title="Uncheck all tasks for a fresh start"><i data-feather="rotate-ccw"></i> Reset</button>
      <button class="btn btn-secondary" id="clearAllBtn" title="Delete all tasks (undo available)"><i data-feather="trash-2"></i> Clear</button>
      <button class="btn btn-secondary" id="carryOverBtn" title="Add yesterday's unfinished tasks"><i data-feather="calendar"></i> Carry</button>
    </div>
    <div class="action-group">
      <button class="btn btn-secondary" id="sampleTasksBtn" title="Load example tasks"><i data-feather="list"></i> Sample</button>
      <button class="btn btn-secondary" id="themeToggleBtn"><i data-feather="moon"></i> Dark</button>
      <button class="btn btn-secondary" id="notifyBtn" title="Enable daily reminders"><i data-feather="bell"></i> Remind</button>
    </div>
  </div>

  <div class="footer-bar">
    <span>rawdog · intuitive focus</span>
    <div class="footer-actions">
      <button id="exportDataBtn" title="Download backup"><i data-feather="download" width="14" height="14"></i> Export</button>
      <button id="shareStreakBtn" title="Share your streak"><i data-feather="share-2" width="14" height="14"></i> Share</button>
      <button id="soundToggleBtn" title="Toggle sound effects"><i data-feather="volume-2" width="14" height="14"></i> Sound</button>
    </div>
  </div>
  <div class="pull-hint">
    <i data-feather="chevron-down" width="12" height="12"></i> Pull down to reset checks
  </div>
</div>

<canvas id="confettiCanvas" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;"></canvas>

<script>
  (function(){
    "use strict";
    // ---------- STATE & STORAGE ----------
    const STORAGE_KEY = 'rawdog_tasks_v4';
    const STREAK_KEY = 'rawdog_streak_v4';
    const PREFS_KEY = 'rawdog_prefs_v4';
    let tasks = [];
    let streak = 0;
    let lastCompletionDate = null;
    let soundEnabled = true;
    let darkMode = false;
    let lastDeletedTasks = null;
    let audioCtx = null;

    // DOM
    const checklistEl = document.getElementById('checklistContainer');
    const newTaskInput = document.getElementById('newTaskInput');
    const addBtn = document.getElementById('addTaskBtn');
    const resetDailyBtn = document.getElementById('resetDailyBtn');
    const clearAllBtn = document.getElementById('clearAllBtn');
    const sampleBtn = document.getElementById('sampleTasksBtn');
    const carryOverBtn = document.getElementById('carryOverBtn');
    const themeToggleBtn = document.getElementById('themeToggleBtn');
    const notifyBtn = document.getElementById('notifyBtn');
    const exportBtn = document.getElementById('exportDataBtn');
    const shareStreakBtn = document.getElementById('shareStreakBtn');
    const soundToggleBtn = document.getElementById('soundToggleBtn');
    const streakSpan = document.getElementById('streakValue');
    const streakContext = document.getElementById('streakContext');
    const progressFill = document.getElementById('progressFill');
    const progressPercent = document.getElementById('progressPercent');
    const progressText = document.getElementById('progressText');
    const greetingMsg = document.getElementById('greetingMsg');

    // Utils
    function generateId() { return Date.now() + '-' + Math.random().toString(36).substr(2,9); }
    function getToday() { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
    function escapeHtml(t) { const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }
    function updateGreeting() {
      const h = new Date().getHours();
      greetingMsg.textContent = h<12 ? 'Good morning' : (h<18 ? 'Good afternoon' : 'Good evening');
    }

    // Theme
    function applyTheme() {
      document.body.classList.toggle('dark', darkMode);
      themeToggleBtn.innerHTML = darkMode ? '<i data-feather="sun"></i> Light' : '<i data-feather="moon"></i> Dark';
      localStorage.setItem(PREFS_KEY, JSON.stringify({ darkMode, soundEnabled }));
      feather.replace();
    }

    // Audio
    function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }
    function playCheck() {
      if(!soundEnabled) return;
      try{ initAudio(); if(audioCtx.state==='suspended') audioCtx.resume();
        const o=audioCtx.createOscillator(), g=audioCtx.createGain();
        o.type='sine'; o.frequency.value=880; g.gain.setValueAtTime(0.08, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime+0.1);
        o.connect(g).connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+0.1);
      }catch(e){}
    }

    // Streak
    function loadStreak() {
      try{ const s=localStorage.getItem(STREAK_KEY); if(s){ const d=JSON.parse(s); streak=d.streak||0; lastCompletionDate=d.lastDate||null; } }catch(e){}
      updateStreakUI();
    }
    function saveStreak() { localStorage.setItem(STREAK_KEY, JSON.stringify({streak, lastDate:lastCompletionDate})); }
    function updateStreakUI() {
      streakSpan.textContent = streak;
      const today = getToday();
      if(streak>0) streakContext.textContent = lastCompletionDate===today ? '· today' : `· ${streak} day streak`;
      else streakContext.textContent = '· start';
    }
    function evaluateStreak() {
      const today = getToday();
      const allDone = tasks.length>0 && tasks.every(t=>t.completed);
      if(!allDone) { updateStreakUI(); return; }
      if(lastCompletionDate !== today) {
        if(!lastCompletionDate) streak=1;
        else {
          const diff = Math.round((new Date(today)-new Date(lastCompletionDate))/86400000);
          streak = diff===1 ? streak+1 : 1;
        }
        lastCompletionDate = today; saveStreak();
        // Simple confetti burst
        startConfetti();
      }
      updateStreakUI();
    }

    // Tasks
    function loadTasks() { try{ const t=localStorage.getItem(STORAGE_KEY); tasks=t?JSON.parse(t):[]; }catch(e){ tasks=[]; } }
    function saveTasks() { localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); }

    function render() {
      if(tasks.length===0) {
        checklistEl.innerHTML = `<li class="empty-state">
          <strong>No tasks yet.</strong><br>
          <span style="font-size:0.9rem;">Add one to start building momentum.</span>
        </li>`;
        updateProgress(); feather.replace(); return;
      }
      let html='';
      tasks.forEach(t=>{
        const checked = t.completed ? 'checked' : '';
        html+=`<li class="task-item ${t.completed?'completed':''}" data-id="${t.id}">
          <div class="checkbox-custom ${checked}" data-id="${t.id}"><i data-feather="check"></i></div>
          <span class="task-content" contenteditable="true" data-id="${t.id}" title="Click to edit">${escapeHtml(t.text)}</span>
          <div class="task-actions">
            <span class="edit-icon"><i data-feather="edit-2" width="16" height="16"></i></span>
            <button class="delete-btn" data-id="${t.id}" title="Delete task"><i data-feather="x" width="18" height="18"></i></button>
          </div>
        </li>`;
      });
      checklistEl.innerHTML = html;
      attachEvents();
      updateProgress();
      evaluateStreak();
      feather.replace();
    }

    function attachEvents() {
      document.querySelectorAll('.checkbox-custom').forEach(cb=>cb.addEventListener('click', e=>{
        const id=cb.dataset.id; const task=tasks.find(t=>t.id===id);
        if(task) { task.completed=!task.completed; playCheck(); saveTasks(); render(); }
      }));
      document.querySelectorAll('.task-content').forEach(el=>{
        el.addEventListener('blur', e=>{
          const id=el.dataset.id; const task=tasks.find(t=>t.id===id);
          if(task) { task.text = el.innerText.trim() || 'untitled'; saveTasks(); render(); }
        });
        el.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); el.blur(); } });
      });
      document.querySelectorAll('.delete-btn').forEach(btn=>btn.addEventListener('click', e=>{
        const id=btn.dataset.id; tasks = tasks.filter(t=>t.id!==id); saveTasks(); render();
      }));
    }

    function updateProgress() {
      const total=tasks.length, done=tasks.filter(t=>t.completed).length;
      const pct = total ? Math.round(done/total*100) : 0;
      progressFill.style.width = pct+'%';
      progressPercent.textContent = pct+'%';
      progressText.textContent = done===total&&total>0 ? 'All done — great work!' : `${done} of ${total} completed`;
    }

    // Simple confetti (minimal)
    function startConfetti() {
      // No external lib; just a visual cue
      const canvas = document.getElementById('confettiCanvas');
      const ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      // Quick burst
      for(let i=0;i<30;i++) {
        ctx.fillStyle = `hsl(${Math.random()*60 + 180}, 80%, 60%)`;
        ctx.beginPath();
        ctx.arc(Math.random()*canvas.width, Math.random()*canvas.height*0.5, 5+Math.random()*8, 0, Math.PI*2);
        ctx.fill();
      }
      setTimeout(() => ctx.clearRect(0,0,canvas.width,canvas.height), 800);
    }

    // Actions
    function addTask(text) { if(!text.trim()) return; tasks.push({id:generateId(), text:text.trim(), completed:false}); saveTasks(); render(); newTaskInput.value=''; newTaskInput.focus(); }
    function resetChecks() { if(tasks.some(t=>t.completed) && !confirm('Uncheck all tasks?')) return; tasks.forEach(t=>t.completed=false); saveTasks(); render(); }
    function clearAll() { if(tasks.length===0) return; lastDeletedTasks=[...tasks]; tasks=[]; saveTasks(); render(); showToast('Tasks cleared', ()=>{ tasks=lastDeletedTasks; saveTasks(); render(); }); }
    function showToast(msg, undo) {
      const toast=document.createElement('div'); toast.className='toast-message';
      toast.innerHTML = `${msg} <button>Undo</button>`; document.body.appendChild(toast);
      toast.querySelector('button').onclick=()=>{ undo(); toast.remove(); };
      setTimeout(()=>toast.remove(), 5000);
    }
    function loadSample() { if(tasks.length && !confirm('Replace with sample tasks?')) return; tasks=[{id:generateId(),text:'Finish that thing',completed:false},{id:generateId(),text:'Drink water',completed:false},{id:generateId(),text:'Deep work 25 min',completed:false}]; saveTasks(); render(); }
    function carryOver() { 
      const yesterdayTasks = tasks.filter(t=>!t.completed).map(t=>({...t, id: generateId(), completed: false}));
      if(yesterdayTasks.length===0) { alert('No unfinished tasks to carry over.'); return; }
      tasks.push(...yesterdayTasks); saveTasks(); render(); 
      showToast(`Added ${yesterdayTasks.length} task(s)`, ()=>{ tasks = tasks.slice(0, -yesterdayTasks.length); saveTasks(); render(); });
    }
    function exportData() { const blob=new Blob([JSON.stringify({tasks,streak,lastDate:lastCompletionDate})],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='rawdog_backup.json'; a.click(); }
    function shareStreak() { if(navigator.share) navigator.share({title:'rawdog streak',text:`🔥 ${streak} day streak on rawdog!`}); else alert(`🔥 ${streak} day streak!`); }

    // Init
    function init() {
      loadTasks(); loadStreak();
      const prefs = JSON.parse(localStorage.getItem(PREFS_KEY)||'{}');
      darkMode = prefs.darkMode || false; soundEnabled = prefs.soundEnabled !== false;
      applyTheme(); updateGreeting(); render();
      feather.replace();
      
      addBtn.addEventListener('click', ()=>addTask(newTaskInput.value));
      resetDailyBtn.addEventListener('click', resetChecks);
      clearAllBtn.addEventListener('click', clearAll);
      sampleBtn.addEventListener('click', loadSample);
      carryOverBtn.addEventListener('click', carryOver);
      themeToggleBtn.addEventListener('click', ()=>{ darkMode = !darkMode; applyTheme(); });
      notifyBtn.addEventListener('click', ()=>{ if('Notification' in window) { Notification.requestPermission().then(perm => { if(perm==='granted') alert('Reminders enabled (demo).'); }); } });
      exportBtn.addEventListener('click', exportData);
      shareStreakBtn.addEventListener('click', shareStreak);
      soundToggleBtn.addEventListener('click', ()=>{ soundEnabled=!soundEnabled; soundToggleBtn.innerHTML = soundEnabled ? '<i data-feather="volume-2"></i> Sound' : '<i data-feather="volume-x"></i> Mute'; feather.replace(); localStorage.setItem(PREFS_KEY, JSON.stringify({darkMode,soundEnabled})); });
      
      newTaskInput.addEventListener('keydown', e=>{ if(e.key==='Enter'&&(e.ctrlKey||e.metaKey)) addTask(newTaskInput.value); if(e.key==='Escape') newTaskInput.value=''; });
      
      // Pull-to-refresh
      let touchStartY = 0;
      document.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, {passive: true});
      document.addEventListener('touchmove', e => { if(window.scrollY===0 && e.touches[0].clientY - touchStartY > 70) { resetChecks(); } }, {passive: false});
      
      if('serviceWorker' in navigator) navigator.serviceWorker.register("data:application/javascript,self.addEventListener('fetch',()=>{});");
    }
    init();
  })();
</script>
</body>
</html>
