<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>rawdog · no excuses</title>
  
  <!-- PWA manifest & theme -->
  <link rel="manifest" href="data:application/manifest+json,{name:'rawdog',short_name:'rawdog',description:'Anti‑procrastination checklist',theme_color:'%230b0e14',background_color:'%230b0e14',display:'standalone',scope:'/',start_url:'/',icons:[{src:'data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'%3E%3Ctext x=\'10\' y=\'70\' font-size=\'70\'%3E⚡%3C/text%3E%3C/svg%3E',sizes:'100x100',type:'image/svg+xml'}]}">
  <meta name="theme-color" content="#0b0e14">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      --bg: #0b0e14;
      --bg-gradient: radial-gradient(circle at 20% 30%, #1a1f2c 0%, #080b10 100%);
      --card-bg: rgba(18, 24, 34, 0.85);
      --border-light: rgba(80, 140, 220, 0.18);
      --text-primary: #eef3fc;
      --text-secondary: #a1bbdd;
      --accent: #1e90ff;
      --accent-glow: #1e90ffaa;
      --progress-bg: #0f1a26;
      --input-bg: #0d1622;
      --btn-secondary-bg: #1e3f60;
      --delete-hover: #ff7b72;
      
      background: var(--bg);
      background-image: var(--bg-gradient);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      padding: 1.5rem;
      margin: 0;
      color: var(--text-primary);
      transition: background 0.3s, color 0.2s;
    }

    /* light mode */
    body.light {
      --bg: #f4f7fc;
      --bg-gradient: radial-gradient(circle at 20% 30%, #e9f0fa 0%, #d9e2ef 100%);
      --card-bg: rgba(255, 255, 255, 0.75);
      --border-light: rgba(30, 100, 200, 0.2);
      --text-primary: #0a1a2b;
      --text-secondary: #2c4b6e;
      --progress-bg: #d0ddee;
      --input-bg: #ffffff;
      --btn-secondary-bg: #d4e0f0;
      --delete-hover: #c0392b;
    }

    .app-card {
      max-width: 750px;
      width: 100%;
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border-light);
      border-radius: 36px;
      box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(0, 180, 255, 0.1) inset;
      padding: 2.2rem 1.8rem;
      transition: all 0.2s ease;
    }

    h1 {
      display: flex;
      align-items: baseline;
      gap: 0.35rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      font-size: 2.6rem;
      line-height: 1.1;
      margin-bottom: 0.2rem;
      color: var(--text-primary);
      text-shadow: 0 2px 5px rgba(0, 20, 40, 0.3);
    }

    .rawdog-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.4rem;
    }

    .rawdog-badge {
      background: #1e3a5f;
      padding: 0.2rem 1rem;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #aad0ff;
      border: 1px solid #2e5580;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }

    .subhead {
      font-size: 1rem;
      margin-bottom: 0.8rem;
      color: var(--text-secondary);
      font-weight: 400;
      border-left: 4px solid var(--accent);
      padding-left: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .greeting {
      font-weight: 500;
    }

    .streak-area {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .streak-counter {
      background: #101a26;
      padding: 0.4rem 1rem;
      border-radius: 30px;
      font-size: 0.9rem;
      font-weight: 500;
      border: 1px solid #254a6e;
      color: #cddfff;
    }
    body.light .streak-counter {
      background: #e3ecf5;
      color: #1a3048;
      border-color: #a0bbd8;
    }
    .streak-counter span {
      font-weight: 700;
      color: #ffd966;
      margin-left: 6px;
      font-size: 1.2rem;
    }

    .streak-message {
      font-size: 0.85rem;
      opacity: 0.9;
      font-style: italic;
    }

    /* progress bar */
    .progress-container {
      margin: 0.5rem 0 1.2rem;
      height: 10px;
      background: var(--progress-bg);
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid #203d58;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #1e90ff, #5bb2ff);
      border-radius: 20px;
      box-shadow: 0 0 10px var(--accent-glow);
      transition: width 0.25s ease, background 0.2s;
    }
    .progress-fill.completed {
      background: linear-gradient(90deg, #2ecc71, #58d68d);
      box-shadow: 0 0 12px #2ecc71aa;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    /* checklist */
    .checklist {
      list-style: none;
      margin: 1.8rem 0 2rem;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      padding: 0.9rem 0.2rem 0.9rem 0.2rem;
      border-bottom: 1px solid rgba(70, 120, 180, 0.25);
      transition: background 0.15s;
    }
    .task-item:last-of-type {
      border-bottom: none;
    }

    /* custom checkbox */
    .checkbox-custom {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      background: transparent;
      border-radius: 8px;
      border: 2px solid #3f6b9c;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s;
      color: white;
    }
    body.light .checkbox-custom {
      border-color: #3a6a9e;
    }
    .checkbox-custom.checked {
      background: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 0 12px var(--accent-glow);
    }
    .checkbox-custom svg {
      width: 18px;
      height: 18px;
      fill: white;
      display: none;
    }
    .checkbox-custom.checked svg {
      display: block;
    }

    .task-text {
      flex: 1;
      font-size: 1.2rem;
      font-weight: 500;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-primary);
      padding: 0.35rem 0;
      transition: color 0.2s, text-decoration 0.2s;
    }
    .task-text:focus {
      border-bottom: 1px dashed var(--accent);
    }
    .task-item.completed .task-text {
      text-decoration: line-through;
      color: #7e95b0;
      font-weight: 400;
    }

    .task-actions {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .edit-hint {
      font-size: 1.1rem;
      opacity: 0.5;
      padding: 5px;
      cursor: pointer;
    }
    .delete-btn {
      background: none;
      border: none;
      color: #6d8db0;
      font-size: 1.6rem;
      cursor: pointer;
      padding: 8px 8px;
      border-radius: 30px;
      opacity: 0.7;
      transition: all 0.2s;
      line-height: 1;
      min-width: 44px;
      min-height: 44px;
    }
    .delete-btn:hover {
      opacity: 1;
      color: var(--delete-hover);
      background: rgba(255, 80, 80, 0.1);
    }

    /* empty state */
    .empty-state {
      padding: 2rem 0.5rem;
      text-align: center;
      color: var(--text-secondary);
      font-style: italic;
      border-bottom: none;
      font-size: 1.1rem;
    }
    .empty-motivation {
      margin-top: 8px;
      font-size: 0.9rem;
      opacity: 0.7;
    }

    /* add section */
    .add-section {
      display: flex;
      gap: 0.6rem;
      margin-top: 0.5rem;
    }
    .add-input {
      flex: 1;
      background: var(--input-bg);
      border: 1.5px solid #264b70;
      border-radius: 60px;
      padding: 0.9rem 1.3rem;
      font-size: 16px; /* prevents zoom */
      color: var(--text-primary);
      outline: none;
      transition: border 0.2s, box-shadow 0.2s;
      font-weight: 400;
      box-shadow: inset 0 4px 8px #00000022;
    }
    .add-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px #1e4f8a55, inset 0 2px 6px #000;
    }

    .btn {
      background: #1e3f60;
      border: 1px solid #2e6090;
      color: #e3f0ff;
      font-weight: 600;
      padding: 0.9rem 1.6rem;
      border-radius: 60px;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 6px 12px #00000033, 0 1px 2px #5f9eff33 inset;
      letter-spacing: 0.3px;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .btn:hover {
      background: #265b88;
      border-color: var(--accent);
      box-shadow: 0 8px 16px #00000055, 0 0 8px #2d7aff;
      transform: translateY(-1px);
      color: white;
    }
    .btn-secondary {
      background: transparent;
      border: 1px solid #3b5f82;
      box-shadow: none;
      color: #b8d0e9;
    }
    .btn-secondary:hover {
      background: #1a3147;
      border-color: #5f8dc9;
    }
    body.light .btn {
      background: #2c5a8c;
      color: white;
    }
    body.light .btn-secondary {
      background: #eef3fc;
      color: #1e3a5f;
      border-color: #a0bbd8;
    }

    .action-bar {
      display: flex;
      gap: 0.8rem;
      justify-content: space-between;
      margin-top: 1.8rem;
      flex-wrap: wrap;
    }
    .group {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .toast-message {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e3a5f;
      color: white;
      padding: 12px 24px;
      border-radius: 40px;
      box-shadow: 0 10px 25px #00000055;
      z-index: 999;
      display: flex;
      align-items: center;
      gap: 15px;
      border: 1px solid var(--accent);
    }
    .toast-message button {
      background: none;
      border: 1px solid white;
      color: white;
      padding: 6px 16px;
      border-radius: 30px;
      cursor: pointer;
    }

    .footer-note {
      margin-top: 1.8rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.75rem;
      color: #6a85a2;
      border-top: 1px dashed #2c4868;
      padding-top: 1.2rem;
    }
    .footer-actions {
      display: flex;
      gap: 12px;
    }
    .footer-actions button {
      background: none;
      border: none;
      color: #7f9bc0;
      font-size: 0.75rem;
      cursor: pointer;
      text-decoration: underline;
    }

    /* pull-to-refresh hint */
    .pull-hint {
      text-align: center;
      font-size: 0.75rem;
      margin-top: 6px;
      opacity: 0.5;
    }
  </style>
</head>
<body>
<div class="app-card" id="appCard">
  <div class="rawdog-title">
    <h1>
      rawdog
      <span style="font-weight: 300; font-size: 1.8rem; margin-left: 6px; color: #9cb9e0;">⚡</span>
    </h1>
    <div class="rawdog-badge">NO EXCUSES</div>
  </div>

  <div class="subhead">
    <span class="greeting" id="greetingMsg">get it done</span>
    <div class="streak-area">
      <div class="streak-counter" id="streakDisplay">
        🔥 <span id="streakValue">0</span>
      </div>
      <span class="streak-message" id="streakContext"></span>
    </div>
  </div>

  <!-- progress -->
  <div class="progress-label">
    <span id="progressText">ready</span>
    <span id="progressPercent">0%</span>
  </div>
  <div class="progress-container">
    <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
  </div>

  <ul class="checklist" id="checklistContainer"></ul>

  <div class="add-section">
    <input type="text" id="newTaskInput" class="add-input" placeholder="what are you avoiding?" autocomplete="off" />
    <button class="btn" id="addTaskBtn">＋ add</button>
  </div>

  <div class="action-bar">
    <div class="group">
      <button class="btn btn-secondary" id="resetDailyBtn" title="Uncheck all tasks">↻ reset</button>
      <button class="btn btn-secondary" id="clearAllBtn">🗑 clear</button>
      <button class="btn btn-secondary" id="carryOverBtn" title="Add yesterday's unfinished tasks">📋 carry over</button>
    </div>
    <div class="group">
      <button class="btn btn-secondary" id="sampleTasksBtn">📋 sample</button>
      <button class="btn btn-secondary" id="themeToggleBtn">🌓 theme</button>
      <button class="btn btn-secondary" id="notifyBtn" title="Enable daily reminder">🔔 remind</button>
    </div>
  </div>

  <div class="footer-note">
    <span>rawdog · anti‑procrastination</span>
    <div class="footer-actions">
      <button id="exportDataBtn">export</button>
      <button id="shareStreakBtn">share streak</button>
      <button id="soundToggleBtn">🔊 sound</button>
    </div>
  </div>
  <div class="pull-hint">↓ pull down to refresh checks</div>
</div>

<!-- Confetti canvas -->
<canvas id="confettiCanvas" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;"></canvas>

<script>
  (function(){
    "use strict";

    // ---------- STORAGE KEYS ----------
    const STORAGE_KEY = 'rawdog_tasks';
    const STREAK_KEY = 'rawdog_streak';
    const PREFS_KEY = 'rawdog_prefs';

    // ---------- STATE ----------
    let tasks = [];
    let streak = 0;
    let lastCompletionDate = null;
    let soundEnabled = true;
    let theme = 'dark'; // dark / light
    let undoClearTimer = null;
    let lastDeletedTasks = null;

    // DOM elements
    const checklistEl = document.getElementById('checklistContainer');
    const newTaskInput = document.getElementById('newTaskInput');
    const addBtn = document.getElementById('addTaskBtn');
    const resetDailyBtn = document.getElementById('resetDailyBtn');
    const clearAllBtn = document.getElementById('clearAllBtn');
    const sampleBtn = document.getElementById('sampleTasksBtn');
    const carryOverBtn = document.getElementById('carryOverBtn');
    const themeToggleBtn = document.getElementById('themeToggleBtn');
    const notifyBtn = document.getElementById('notifyBtn');
    const exportBtn = document.getElementById('exportDataBtn');
    const shareStreakBtn = document.getElementById('shareStreakBtn');
    const soundToggleBtn = document.getElementById('soundToggleBtn');
    const streakSpan = document.getElementById('streakValue');
    const streakContext = document.getElementById('streakContext');
    const progressFill = document.getElementById('progressFill');
    const progressPercent = document.getElementById('progressPercent');
    const progressText = document.getElementById('progressText');
    const greetingMsg = document.getElementById('greetingMsg');
    const confettiCanvas = document.getElementById('confettiCanvas');
    let ctx = confettiCanvas.getContext('2d');
    
    // Audio context for simple beep
    let audioCtx = null;
    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    function playCheckSound() {
      if (!soundEnabled) return;
      try {
        initAudio();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = 880;
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
      } catch(e) {}
    }

    // ---------- UTILS ----------
    function generateId() { return Date.now() + '-' + Math.random().toString(36).substr(2, 9); }
    function getTodayString() { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
    function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }

    // Time greeting
    function updateGreeting() {
      const hour = new Date().getHours();
      let greet = 'get it done';
      if (hour < 12) greet = 'morning grind';
      else if (hour < 18) greet = 'afternoon push';
      else greet = 'night shift';
      greetingMsg.textContent = greet;
    }

    // ---------- THEME ----------
    function applyTheme() {
      document.body.classList.toggle('light', theme === 'light');
      localStorage.setItem(PREFS_KEY, JSON.stringify({ theme, soundEnabled }));
    }

    // ---------- STREAK ----------
    function loadStreak() {
      try {
        const saved = localStorage.getItem(STREAK_KEY);
        if (saved) { const data = JSON.parse(saved); streak = data.streak || 0; lastCompletionDate = data.lastDate || null; }
      } catch(e) {}
      updateStreakUI();
    }
    function saveStreak() {
      localStorage.setItem(STREAK_KEY, JSON.stringify({ streak, lastDate: lastCompletionDate }));
    }
    function updateStreakUI() {
      streakSpan.textContent = streak;
      const today = getTodayString();
      if (streak > 0) streakContext.textContent = lastCompletionDate === today ? '🔥 today done' : `${streak} day streak`;
      else streakContext.textContent = 'start a streak';
    }
    function evaluateStreak() {
      const today = getTodayString();
      const allCompleted = tasks.length > 0 && tasks.every(t => t.completed);
      if (!allCompleted) { updateStreakUI(); return; }
      if (lastCompletionDate !== today) {
        if (!lastCompletionDate) streak = 1;
        else {
          const diff = Math.round((new Date(today) - new Date(lastCompletionDate)) / 86400000);
          streak = (diff === 1) ? streak + 1 : 1;
        }
        lastCompletionDate = today;
        saveStreak();
        // confetti if all completed today
        if (allCompleted) startConfetti();
      }
      updateStreakUI();
    }

    // ---------- TASKS ----------
    function loadTasks() {
      try {
        const stored = localStorage.getItem(STORAGE_KEY);
        tasks = stored ? JSON.parse(stored) : [];
        if (!Array.isArray(tasks)) tasks = [];
      } catch(e) { tasks = []; }
    }
    function saveTasks() { localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); }

    // Render
    function render() {
      if (tasks.length === 0) {
        checklistEl.innerHTML = `<li class="empty-state">rawdog empty.<div class="empty-motivation">what's the one thing you're avoiding?</div></li>`;
        updateProgress();
        return;
      }
      let html = '';
      tasks.forEach(task => {
        const checked = task.completed ? 'checked' : '';
        const completedClass = task.completed ? 'completed' : '';
        html += `<li class="task-item ${completedClass}" data-id="${task.id}">
          <div class="checkbox-custom ${checked}" data-id="${task.id}" role="checkbox" aria-checked="${task.completed}">
            <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>
          </div>
          <span class="task-text" contenteditable="true" data-id="${task.id}">${escapeHtml(task.text)}</span>
          <div class="task-actions">
            <span class="edit-hint" title="click text to edit">✎</span>
            <button class="delete-btn" data-id="${task.id}" aria-label="delete">🗑</button>
          </div>
        </li>`;
      });
      checklistEl.innerHTML = html;
      attachTaskEvents();
      updateProgress();
      evaluateStreak();
    }

    function attachTaskEvents() {
      document.querySelectorAll('.checkbox-custom').forEach(cb => {
        cb.addEventListener('click', e => {
          e.stopPropagation();
          const id = cb.dataset.id;
          const task = tasks.find(t => t.id === id);
          if (task) { task.completed = !task.completed; playCheckSound(); saveTasks(); render(); }
        });
      });
      document.querySelectorAll('.task-text').forEach(el => {
        el.addEventListener('blur', e => {
          const id = el.dataset.id;
          const task = tasks.find(t => t.id === id);
          if (task) { task.text = el.innerText.trim() || 'untitled'; saveTasks(); render(); }
        });
        el.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); el.blur(); } });
      });
      document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', e => {
          const id = btn.dataset.id;
          tasks = tasks.filter(t => t.id !== id);
          saveTasks(); render();
        });
      });
    }

    function updateProgress() {
      const total = tasks.length;
      const done = tasks.filter(t => t.completed).length;
      const percent = total ? Math.round((done / total) * 100) : 0;
      progressFill.style.width = percent + '%';
      progressPercent.textContent = percent + '%';
      progressText.textContent = done === total && total > 0 ? 'all done! 💪' : `${done}/${total} completed`;
      progressFill.classList.toggle('completed', done === total && total > 0);
    }

    // ---------- CONFETTI ----------
    function startConfetti() {
      // simple confetti burst
      confettiCanvas.width = window.innerWidth; confettiCanvas.height = window.innerHeight;
      // using simple particles
    }

    // ---------- ACTIONS ----------
    function addTask(text) {
      if (!text.trim()) return;
      tasks.push({ id: generateId(), text: text.trim(), completed: false });
      saveTasks(); render(); newTaskInput.value = '';
    }

    function resetChecks() {
      const hasCompleted = tasks.some(t => t.completed);
      if (hasCompleted && !confirm('Uncheck all tasks?')) return;
      tasks.forEach(t => t.completed = false);
      saveTasks(); render();
    }

    function clearAllTasks() {
      if (tasks.length === 0) return;
      lastDeletedTasks = [...tasks];
      tasks = [];
      saveTasks(); render();
      showToast('Tasks cleared', () => {
        tasks = lastDeletedTasks; saveTasks(); render(); lastDeletedTasks = null;
      });
    }

    function showToast(msg, undoCallback) {
      const toast = document.createElement('div'); toast.className = 'toast-message';
      toast.innerHTML = `${msg} <button>Undo</button>`;
      document.body.appendChild(toast);
      toast.querySelector('button').onclick = () => { undoCallback(); toast.remove(); };
      setTimeout(() => toast.remove(), 5000);
    }

    function loadSample() {
      if (tasks.length > 0 && !confirm('Replace current tasks with sample?')) return;
      tasks = [
        { id: generateId(), text: 'Finish that thing you\'re avoiding', completed: false },
        { id: generateId(), text: 'Drink water', completed: false },
        { id: generateId(), text: 'Deep work for 25 min', completed: false }
      ];
      saveTasks(); render();
    }

    function carryOverYesterday() {
      // dummy: just add a couple tasks for demo
      tasks.push({ id: generateId(), text: 'yesterday\'s leftover', completed: false });
      saveTasks(); render();
    }

    // ---------- PWA / NOTIFICATIONS ----------
    function requestNotificationPermission() {
      if ('Notification' in window) {
        Notification.requestPermission().then(perm => {
          if (perm === 'granted') {
            scheduleDailyReminder();
            alert('Reminder set for 9 AM daily.');
          }
        });
      }
    }
    function scheduleDailyReminder() {
      // simplified: check at load
    }

    // ---------- EXPORT / SHARE ----------
    function exportData() {
      const dataStr = JSON.stringify({ tasks, streak, lastDate: lastCompletionDate }, null, 2);
      const blob = new Blob([dataStr], {type: 'application/json'});
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'rawdog_backup.json'; a.click();
    }
    function shareStreak() {
      if (navigator.share) navigator.share({ title: 'rawdog streak', text: `I have a ${streak} day streak on rawdog!` });
      else alert(`🔥 ${streak} day streak!`);
    }

    // ---------- PULL TO REFRESH ----------
    let touchStartY = 0;
    document.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, {passive: true});
    document.addEventListener('touchmove', e => {
      if (window.scrollY === 0 && e.touches[0].clientY - touchStartY > 80) {
        resetChecks();
      }
    }, {passive: false});

    // ---------- KEYBOARD ----------
    newTaskInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { addTask(newTaskInput.value); }
      if (e.key === 'Escape') newTaskInput.value = '';
    });

    // ---------- INIT ----------
    function init() {
      loadTasks(); loadStreak();
      const prefs = JSON.parse(localStorage.getItem(PREFS_KEY) || '{}');
      theme = prefs.theme || 'dark'; soundEnabled = prefs.soundEnabled !== false;
      applyTheme(); updateGreeting(); render();

      addBtn.addEventListener('click', () => addTask(newTaskInput.value));
      resetDailyBtn.addEventListener('click', resetChecks);
      clearAllBtn.addEventListener('click', clearAllTasks);
      sampleBtn.addEventListener('click', loadSample);
      carryOverBtn.addEventListener('click', carryOverYesterday);
      themeToggleBtn.addEventListener('click', () => { theme = theme === 'dark' ? 'light' : 'dark'; applyTheme(); });
      notifyBtn.addEventListener('click', requestNotificationPermission);
      exportBtn.addEventListener('click', exportData);
      shareStreakBtn.addEventListener('click', shareStreak);
      soundToggleBtn.addEventListener('click', () => { soundEnabled = !soundEnabled; soundToggleBtn.textContent = soundEnabled ? '🔊 sound' : '🔇 sound'; localStorage.setItem(PREFS_KEY, JSON.stringify({theme, soundEnabled})); });

      // Service Worker for PWA
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register("data:application/javascript,self.addEventListener('fetch',()=>{});");
      }
    }

    init();
  })();
</script>
</body>
</html>
