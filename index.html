<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RAWDOG</title>
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<style>
  body { background-color:#121212; font-family:'Roboto',sans-serif; color:white; }
  .task-completed { text-decoration: line-through; color:#777; }
  .alert { animation: flash 0.5s ease 0s 3; }
  @keyframes flash { 0%,100%{opacity:1}50%{opacity:0.1} }
</style>
</head>
<body class="flex justify-center items-start p-8 min-h-screen">
<div id="root" class="w-full max-w-md"></div>

<script type="text/javascript">
const { useState, useEffect } = React;

function App() {
  // Tasks & Input
  const [tasks, setTasks] = useState(JSON.parse(localStorage.getItem("rawdogTasks"))||[]);
  const [input, setInput] = useState("");
  
  // Timer
  const [seconds, setSeconds] = useState(50*60);
  const [running, setRunning] = useState(false);
  
  // Streak
  const [streak, setStreak] = useState(parseInt(localStorage.getItem("rawdogStreak"))||0);
  
  // Mission alert
  const [alert, setAlert] = useState("");

  // Timer effect
  useEffect(() => {
    let timer;
    if(running){
      timer = setInterval(()=>{
        setSeconds(prev=>{
          if(prev<=1){
            setRunning(false);
            incompleteMissionAlert();
            return 0;
          }
          return prev-1;
        });
      },1000);
    }
    return ()=>clearInterval(timer);
  },[running]);

  // LocalStorage & streak effect
  useEffect(()=>{
    localStorage.setItem("rawdogTasks",JSON.stringify(tasks));
    const allComplete = tasks.length>0 && tasks.every(t=>t.completed);
    if(allComplete) setStreak(prev=>prev+1);
    else if(tasks.some(t=>!t.completed)) setStreak(0);
    localStorage.setItem("rawdogStreak",streak);
  },[tasks]);

  // Helpers
  const addTask = (title)=>{
    if(!title.trim()) return;
    setTasks([...tasks,{id:Date.now(),title,completed:false}]);
    setInput("");
  }
  const toggleTask=(id)=>setTasks(tasks.map(t=>t.id===id?{...t,completed:!t.completed}:t));
  const deleteTask=(id)=>setTasks(tasks.filter(t=>t.id!==id));
  const formatTime=(sec)=>{
    const m=Math.floor(sec/60),s=sec%60;
    return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
  }

  // Mission failed alert
  const incompleteMissionAlert=()=>{
    setAlert("MISSION FAILED");
    setTimeout(()=>setAlert(""),2000);
  }

  return React.createElement('div',{className:"flex flex-col items-center w-full"},
    // Title
    React.createElement('h1',{className:"text-5xl font-bold text-green-800 uppercase mb-6"},"RAWDOG"),
    
    // Alert
    alert && React.createElement('div',{className:"bg-red-800 w-full text-center p-2 font-bold mb-4 alert"},alert),

    // Timer
    React.createElement('div',{className:"mb-6"},
      React.createElement('div',{className:"text-3xl font-bold text-white"},formatTime(seconds)),
      React.createElement('button',{
        onClick:()=>setRunning(!running),
        className:"mt-2 px-4 py-2 bg-red-800 rounded uppercase font-bold text-white"
      },running?"Abort":"Commence")
    ),

    // Task Input
    React.createElement('div',{className:"flex w-full mb-4"},
      React.createElement('input',{
        className:"flex-grow p-2 rounded-none text-black",
        placeholder:"Deploy mission...",
        value:input,
        onChange:e=>setInput(e.target.value)
      }),
      React.createElement('button',{
        onClick:()=>addTask(input),
        className:"bg-red-800 p-2 rounded-none font-bold uppercase text-white"
      },"Deploy")
    ),

    // Task List
    React.createElement('div',{className:"w-full"},
      tasks.map(task =>
        React.createElement('div',{
          key:task.id,
          className:"flex justify-between items-center bg-green-900 p-3 mb-2"
        },
          React.createElement('div',{
            onClick:()=>toggleTask(task.id),
            className:task.completed?"task-completed flex-grow":"flex-grow cursor-pointer"
          },task.title),
          React.createElement('button',{
            onClick:()=>deleteTask(task.id),
            className:"text-red-800 font-bold ml-2"
          },"X")
        )
      )
    ),

    // Streak
    React.createElement('div',{className:"mt-6 text-xl font-bold text-white"},"Streak: "+streak+" — Keep Fighting")
  );
}

// Render
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
