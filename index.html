<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>rawdog · anti‑procrastination</title>
  
  <!-- PWA manifest & icons -->
  <link rel="manifest" href="data:application/manifest+json,{name:'rawdog',short_name:'rawdog',description:'Anti‑procrastination checklist',theme_color:'%230b0e14',background_color:'%230b0e14',display:'standalone',scope:'/',start_url:'/',icons:[{src:'data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'%3E%3Ctext x=\'10\' y=\'70\' font-size=\'70\'%3E⚡%3C/text%3E%3C/svg%3E',sizes:'100x100',type:'image/svg+xml'}]}">
  <meta name="theme-color" content="#0b0e14">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <!-- Feather Icons for clean UI -->
  <script src="https://unpkg.com/feather-icons"></script>
  
  <style>
    /* ----- RESET & BASE ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      --bg-gradient-start: #0a0f1a;
      --bg-gradient-end: #0d1422;
      --glass-bg: rgba(20, 30, 45, 0.7);
      --glass-border: rgba(80, 160, 255, 0.15);
      --accent: #3b82f6;
      --accent-soft: #60a5fa;
      --accent-glow: rgba(59, 130, 246, 0.5);
      --text-primary: #f0f4ff;
      --text-secondary: #9bb1d0;
      --card-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(60, 130, 246, 0.1) inset;
      --input-bg: rgba(10, 20, 35, 0.6);
      --progress-bg: rgba(30, 45, 70, 0.5);
      --delete-hover: #ff7b72;
      
      background: radial-gradient(circle at 30% 20%, #14233c, #050a12);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 1.5rem;
      margin: 0;
      color: var(--text-primary);
      transition: background 0.3s, color 0.2s;
      backdrop-filter: blur(2px);
    }

    /* Light mode */
    body.light {
      --bg-gradient-start: #eef2f8;
      --bg-gradient-end: #d9e2f0;
      --glass-bg: rgba(255, 255, 255, 0.65);
      --glass-border: rgba(59, 130, 246, 0.25);
      --text-primary: #0f1a2b;
      --text-secondary: #345173;
      --card-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.15), 0 0 0 1px rgba(59, 130, 246, 0.2) inset;
      --input-bg: rgba(255, 255, 255, 0.8);
      --progress-bg: #cdd9eb;
      --delete-hover: #e03a3a;
      background: radial-gradient(circle at 30% 20%, #d6e3ff, #b8c9e5);
    }

    /* ----- MAIN CARD ----- */
    .app-card {
      max-width: 720px;
      width: 100%;
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 48px;
      box-shadow: var(--card-shadow);
      padding: 2.5rem 2rem;
      transition: all 0.25s ease;
    }

    /* ----- HEADER ----- */
    .app-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }

    h1 {
      display: flex;
      align-items: baseline;
      gap: 0.4rem;
      font-weight: 700;
      font-size: 2.8rem;
      letter-spacing: -0.03em;
      color: white;
      text-shadow: 0 4px 12px rgba(0, 30, 60, 0.6);
    }
    body.light h1 {
      color: #0a1a2b;
      text-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }
    .rawdog-emoji {
      font-size: 2.4rem;
      margin-left: 6px;
    }
    .badge {
      background: rgba(30, 60, 100, 0.5);
      backdrop-filter: blur(4px);
      padding: 0.3rem 1.2rem;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #b8d6ff;
      border: 1px solid rgba(100, 170, 255, 0.3);
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    /* ----- GREETING & STREAK ----- */
    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      padding-left: 0.3rem;
    }
    .greeting {
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--text-secondary);
      border-left: 3px solid var(--accent);
      padding-left: 1rem;
    }
    .streak-pill {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(20, 40, 65, 0.5);
      backdrop-filter: blur(4px);
      padding: 0.4rem 1.2rem 0.4rem 1rem;
      border-radius: 40px;
      border: 1px solid rgba(80, 150, 255, 0.2);
    }
    .streak-number {
      font-weight: 700;
      font-size: 1.3rem;
      color: #ffd966;
      margin-left: 4px;
    }
    .streak-message {
      font-size: 0.8rem;
      opacity: 0.8;
    }

    /* ----- PROGRESS BAR (sleek) ----- */
    .progress-section {
      margin: 0.5rem 0 1.8rem;
    }
    .progress-header {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }
    .progress-track {
      height: 8px;
      background: var(--progress-bg);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), #8ab4f8);
      border-radius: 20px;
      box-shadow: 0 0 12px var(--accent-glow);
      transition: width 0.3s cubic-bezier(0.2, 0.9, 0.4, 1);
    }
    .progress-fill.completed {
      background: linear-gradient(90deg, #2ecc71, #58d68d);
      box-shadow: 0 0 14px #2ecc71aa;
    }

    /* ----- CHECKLIST (polished) ----- */
    .checklist {
      list-style: none;
      margin: 0.5rem 0 2rem;
    }
    .task-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 0.5rem;
      border-bottom: 1px solid rgba(100, 160, 240, 0.1);
      transition: background 0.2s;
    }
    .task-item:last-child {
      border-bottom: none;
    }

    /* Custom checkbox with animation */
    .checkbox-custom {
      flex-shrink: 0;
      width: 26px;
      height: 26px;
      background: rgba(20, 40, 65, 0.5);
      border-radius: 8px;
      border: 2px solid rgba(100, 170, 255, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
    body.light .checkbox-custom {
      background: rgba(255,255,255,0.7);
      border-color: #3b82f6;
    }
    .checkbox-custom:hover {
      border-color: var(--accent);
      transform: scale(1.05);
    }
    .checkbox-custom.checked {
      background: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 0 14px var(--accent-glow);
    }
    .checkbox-custom svg {
      width: 18px;
      height: 18px;
      stroke: white;
      stroke-width: 2.5;
      display: none;
    }
    .checkbox-custom.checked svg {
      display: block;
    }

    .task-content {
      flex: 1;
      font-size: 1.15rem;
      font-weight: 500;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-primary);
      padding: 0.2rem 0;
      transition: color 0.2s, text-decoration 0.2s;
      word-break: break-word;
    }
    .task-content:focus {
      border-bottom: 2px dashed var(--accent);
    }
    .task-item.completed .task-content {
      text-decoration: line-through;
      color: #7e95b0;
      font-weight: 400;
    }

    .task-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .edit-icon {
      opacity: 0.5;
      transition: opacity 0.2s;
      cursor: pointer;
    }
    .edit-icon:hover { opacity: 1; }
    .delete-btn {
      background: none;
      border: none;
      color: #7a9bcb;
      cursor: pointer;
      padding: 8px;
      border-radius: 30px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .delete-btn:hover {
      color: var(--delete-hover);
      background: rgba(255, 80, 80, 0.15);
    }

    /* empty state */
    .empty-state {
      padding: 2.5rem 0.5rem;
      text-align: center;
      color: var(--text-secondary);
      font-style: italic;
      border-bottom: none;
    }

    /* ----- ADD TASK ----- */
    .add-section {
      display: flex;
      gap: 0.8rem;
      margin: 1rem 0 2rem;
    }
    .add-input {
      flex: 1;
      background: var(--input-bg);
      backdrop-filter: blur(4px);
      border: 1.5px solid rgba(100, 170, 255, 0.25);
      border-radius: 60px;
      padding: 1rem 1.5rem;
      font-size: 16px;
      color: var(--text-primary);
      outline: none;
      transition: border 0.2s, box-shadow 0.2s;
      font-weight: 400;
      box-shadow: inset 0 4px 10px rgba(0,0,0,0.1);
    }
    .add-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.3), inset 0 2px 8px #00000033;
    }
    .add-input::placeholder {
      color: var(--text-secondary);
      opacity: 0.7;
    }

    .btn {
      background: rgba(30, 60, 100, 0.7);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(100, 170, 255, 0.4);
      color: white;
      font-weight: 600;
      padding: 0.9rem 1.8rem;
      border-radius: 60px;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 8px 16px rgba(0,0,0,0.2);
      letter-spacing: 0.3px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .btn:hover {
      background: #265b88;
      border-color: var(--accent);
      box-shadow: 0 8px 18px #00000055, 0 0 10px var(--accent-glow);
      transform: translateY(-1px);
    }
    .btn-secondary {
      background: transparent;
      border: 1px solid rgba(100, 170, 255, 0.25);
      box-shadow: none;
    }
    .btn-secondary:hover {
      background: rgba(30, 60, 100, 0.4);
    }

    .action-bar {
      display: flex;
      gap: 0.8rem;
      justify-content: space-between;
      flex-wrap: wrap;
    }
    .action-group {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    /* ----- FOOTER / UTILS ----- */
    .footer-bar {
      margin-top: 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.75rem;
      color: var(--text-secondary);
      border-top: 1px dashed rgba(100,160,240,0.2);
      padding-top: 1.2rem;
    }
    .footer-actions {
      display: flex;
      gap: 16px;
    }
    .footer-actions button {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 0.75rem;
      cursor: pointer;
      text-decoration: underline dotted;
      opacity: 0.8;
      transition: opacity 0.2s;
    }

    .toast-message {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(20,40,70,0.9);
      backdrop-filter: blur(8px);
      color: white;
      padding: 12px 24px;
      border-radius: 60px;
      box-shadow: 0 15px 30px #00000066;
      z-index: 999;
      display: flex;
      align-items: center;
      gap: 20px;
      border: 1px solid var(--accent);
    }
    .toast-message button {
      background: none;
      border: 1px solid white;
      color: white;
      padding: 6px 16px;
      border-radius: 30px;
      cursor: pointer;
    }

    canvas { display: block; }
    .pull-hint { text-align: center; margin-top: 8px; opacity: 0.4; font-size: 0.7rem; }
  </style>
</head>
<body>
<div class="app-card">
  <div class="app-header">
    <h1>rawdog <span class="rawdog-emoji">⚡</span></h1>
    <div class="badge">no excuses</div>
  </div>

  <div class="status-row">
    <div class="greeting" id="greetingMsg">get it done</div>
    <div class="streak-pill">
      <span>🔥</span>
      <span class="streak-number" id="streakValue">0</span>
      <span class="streak-message" id="streakContext"></span>
    </div>
  </div>

  <div class="progress-section">
    <div class="progress-header">
      <span id="progressText">ready</span>
      <span id="progressPercent">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <ul class="checklist" id="checklistContainer"></ul>

  <div class="add-section">
    <input type="text" id="newTaskInput" class="add-input" placeholder="What are you avoiding?" autocomplete="off" />
    <button class="btn" id="addTaskBtn"><i data-feather="plus-circle"></i> add</button>
  </div>

  <div class="action-bar">
    <div class="action-group">
      <button class="btn btn-secondary" id="resetDailyBtn"><i data-feather="rotate-ccw"></i> reset</button>
      <button class="btn btn-secondary" id="clearAllBtn"><i data-feather="trash-2"></i> clear</button>
      <button class="btn btn-secondary" id="carryOverBtn"><i data-feather="calendar"></i> carry</button>
    </div>
    <div class="action-group">
      <button class="btn btn-secondary" id="sampleTasksBtn"><i data-feather="list"></i> sample</button>
      <button class="btn btn-secondary" id="themeToggleBtn"><i data-feather="sun"></i> theme</button>
      <button class="btn btn-secondary" id="notifyBtn"><i data-feather="bell"></i> remind</button>
    </div>
  </div>

  <div class="footer-bar">
    <span>rawdog · anti‑procrastination</span>
    <div class="footer-actions">
      <button id="exportDataBtn"><i data-feather="download" width="14" height="14"></i> export</button>
      <button id="shareStreakBtn"><i data-feather="share-2" width="14" height="14"></i> share</button>
      <button id="soundToggleBtn"><i data-feather="volume-2" width="14" height="14"></i> sound</button>
    </div>
  </div>
  <div class="pull-hint">↓ pull down to refresh checks</div>
</div>

<canvas id="confettiCanvas" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;"></canvas>

<script>
  (function(){
    "use strict";
    // ---------- STATE & STORAGE ----------
    const STORAGE_KEY = 'rawdog_tasks';
    const STREAK_KEY = 'rawdog_streak';
    const PREFS_KEY = 'rawdog_prefs';
    let tasks = [];
    let streak = 0;
    let lastCompletionDate = null;
    let soundEnabled = true;
    let theme = 'dark';
    let undoClearTimer = null, lastDeletedTasks = null;
    let audioCtx = null;

    // DOM elements
    const checklistEl = document.getElementById('checklistContainer');
    const newTaskInput = document.getElementById('newTaskInput');
    const addBtn = document.getElementById('addTaskBtn');
    const resetDailyBtn = document.getElementById('resetDailyBtn');
    const clearAllBtn = document.getElementById('clearAllBtn');
    const sampleBtn = document.getElementById('sampleTasksBtn');
    const carryOverBtn = document.getElementById('carryOverBtn');
    const themeToggleBtn = document.getElementById('themeToggleBtn');
    const notifyBtn = document.getElementById('notifyBtn');
    const exportBtn = document.getElementById('exportDataBtn');
    const shareStreakBtn = document.getElementById('shareStreakBtn');
    const soundToggleBtn = document.getElementById('soundToggleBtn');
    const streakSpan = document.getElementById('streakValue');
    const streakContext = document.getElementById('streakContext');
    const progressFill = document.getElementById('progressFill');
    const progressPercent = document.getElementById('progressPercent');
    const progressText = document.getElementById('progressText');
    const greetingMsg = document.getElementById('greetingMsg');
    const confettiCanvas = document.getElementById('confettiCanvas');
    
    // ---------- UTILS ----------
    function generateId() { return Date.now() + '-' + Math.random().toString(36).substr(2,9); }
    function getToday() { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
    function escapeHtml(t) { const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }
    function updateGreeting() {
      const h = new Date().getHours();
      greetingMsg.textContent = h<12 ? 'morning grind' : (h<18 ? 'afternoon push' : 'night shift');
    }

    // Theme
    function applyTheme() {
      document.body.classList.toggle('light', theme === 'light');
      localStorage.setItem(PREFS_KEY, JSON.stringify({ theme, soundEnabled }));
      feather.replace();
    }

    // Audio
    function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }
    function playCheck() {
      if(!soundEnabled) return;
      try{ initAudio(); if(audioCtx.state==='suspended') audioCtx.resume();
        const o=audioCtx.createOscillator(), g=audioCtx.createGain();
        o.type='sine'; o.frequency.value=880; g.gain.setValueAtTime(0.08, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime+0.1);
        o.connect(g).connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+0.1);
      }catch(e){}
    }

    // Streak
    function loadStreak() {
      try{ const s=localStorage.getItem(STREAK_KEY); if(s){ const d=JSON.parse(s); streak=d.streak||0; lastCompletionDate=d.lastDate||null; } }catch(e){}
      updateStreakUI();
    }
    function saveStreak() { localStorage.setItem(STREAK_KEY, JSON.stringify({streak, lastDate:lastCompletionDate})); }
    function updateStreakUI() {
      streakSpan.textContent = streak;
      const today = getToday();
      if(streak>0) streakContext.textContent = lastCompletionDate===today ? '🔥 today' : `${streak} day streak`;
      else streakContext.textContent = 'start';
    }
    function evaluateStreak() {
      const today = getToday();
      const allDone = tasks.length>0 && tasks.every(t=>t.completed);
      if(!allDone) { updateStreakUI(); return; }
      if(lastCompletionDate !== today) {
        if(!lastCompletionDate) streak=1;
        else {
          const diff = Math.round((new Date(today)-new Date(lastCompletionDate))/86400000);
          streak = diff===1 ? streak+1 : 1;
        }
        lastCompletionDate = today; saveStreak();
        if(allDone) startConfetti();
      }
      updateStreakUI();
    }

    // Tasks
    function loadTasks() { try{ const t=localStorage.getItem(STORAGE_KEY); tasks=t?JSON.parse(t):[]; }catch(e){ tasks=[]; } }
    function saveTasks() { localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); }

    function render() {
      if(tasks.length===0) {
        checklistEl.innerHTML = `<li class="empty-state">rawdog empty.<div style="margin-top:8px;font-size:0.9rem;">what's the one thing you're avoiding?</div></li>`;
        updateProgress(); feather.replace(); return;
      }
      let html='';
      tasks.forEach(t=>{
        const checked = t.completed ? 'checked' : '';
        html+=`<li class="task-item ${t.completed?'completed':''}" data-id="${t.id}">
          <div class="checkbox-custom ${checked}" data-id="${t.id}"><i data-feather="check"></i></div>
          <span class="task-content" contenteditable="true" data-id="${t.id}">${escapeHtml(t.text)}</span>
          <div class="task-actions">
            <span class="edit-icon" title="click text to edit"><i data-feather="edit-2" width="16" height="16"></i></span>
            <button class="delete-btn" data-id="${t.id}"><i data-feather="x" width="20" height="20"></i></button>
          </div>
        </li>`;
      });
      checklistEl.innerHTML = html;
      attachEvents();
      updateProgress();
      evaluateStreak();
      feather.replace();
    }

    function attachEvents() {
      document.querySelectorAll('.checkbox-custom').forEach(cb=>cb.addEventListener('click', e=>{
        const id=cb.dataset.id; const task=tasks.find(t=>t.id===id);
        if(task) { task.completed=!task.completed; playCheck(); saveTasks(); render(); }
      }));
      document.querySelectorAll('.task-content').forEach(el=>{
        el.addEventListener('blur', e=>{
          const id=el.dataset.id; const task=tasks.find(t=>t.id===id);
          if(task) { task.text = el.innerText.trim() || 'untitled'; saveTasks(); render(); }
        });
        el.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); el.blur(); } });
      });
      document.querySelectorAll('.delete-btn').forEach(btn=>btn.addEventListener('click', e=>{
        const id=btn.dataset.id; tasks = tasks.filter(t=>t.id!==id); saveTasks(); render();
      }));
    }

    function updateProgress() {
      const total=tasks.length, done=tasks.filter(t=>t.completed).length;
      const pct = total ? Math.round(done/total*100) : 0;
      progressFill.style.width = pct+'%';
      progressPercent.textContent = pct+'%';
      progressText.textContent = done===total&&total>0 ? 'all done! 💪' : `${done}/${total} completed`;
      progressFill.classList.toggle('completed', done===total&&total>0);
    }

    // Confetti (simple)
    function startConfetti() {
      // minimal confetti simulation for demo
      confettiCanvas.width = window.innerWidth; confettiCanvas.height = window.innerHeight;
    }

    // Actions
    function addTask(text) { if(!text.trim()) return; tasks.push({id:generateId(), text:text.trim(), completed:false}); saveTasks(); render(); newTaskInput.value=''; }
    function resetChecks() { if(tasks.some(t=>t.completed) && !confirm('Uncheck all tasks?')) return; tasks.forEach(t=>t.completed=false); saveTasks(); render(); }
    function clearAll() { if(tasks.length===0) return; lastDeletedTasks=[...tasks]; tasks=[]; saveTasks(); render(); showToast('Tasks cleared', ()=>{ tasks=lastDeletedTasks; saveTasks(); render(); }); }
    function showToast(msg, undo) {
      const toast=document.createElement('div'); toast.className='toast-message';
      toast.innerHTML = `${msg} <button>Undo</button>`; document.body.appendChild(toast);
      toast.querySelector('button').onclick=()=>{ undo(); toast.remove(); };
      setTimeout(()=>toast.remove(), 5000);
    }
    function loadSample() { if(tasks.length && !confirm('Replace with sample?')) return; tasks=[{id:generateId(),text:'Finish that thing',completed:false},{id:generateId(),text:'Drink water',completed:false},{id:generateId(),text:'Deep work 25min',completed:false}]; saveTasks(); render(); }
    function carryOver() { tasks.push({id:generateId(), text:'yesterday\'s leftover', completed:false}); saveTasks(); render(); }
    function exportData() { const blob=new Blob([JSON.stringify({tasks,streak,lastDate:lastCompletionDate})],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='rawdog_backup.json'; a.click(); }
    function shareStreak() { if(navigator.share) navigator.share({title:'rawdog streak',text:`🔥 ${streak} day streak!`}); else alert(`🔥 ${streak} day streak!`); }

    // Init
    function init() {
      loadTasks(); loadStreak();
      const prefs = JSON.parse(localStorage.getItem(PREFS_KEY)||'{}');
      theme = prefs.theme||'dark'; soundEnabled = prefs.soundEnabled!==false;
      applyTheme(); updateGreeting(); render();
      feather.replace();
      
      addBtn.addEventListener('click', ()=>addTask(newTaskInput.value));
      resetDailyBtn.addEventListener('click', resetChecks);
      clearAllBtn.addEventListener('click', clearAll);
      sampleBtn.addEventListener('click', loadSample);
      carryOverBtn.addEventListener('click', carryOver);
      themeToggleBtn.addEventListener('click', ()=>{ theme = theme==='dark'?'light':'dark'; applyTheme(); });
      notifyBtn.addEventListener('click', ()=>{ if('Notification' in window) Notification.requestPermission(); });
      exportBtn.addEventListener('click', exportData);
      shareStreakBtn.addEventListener('click', shareStreak);
      soundToggleBtn.addEventListener('click', ()=>{ soundEnabled=!soundEnabled; soundToggleBtn.innerHTML = soundEnabled ? '<i data-feather="volume-2"></i> sound' : '<i data-feather="volume-x"></i> mute'; feather.replace(); localStorage.setItem(PREFS_KEY, JSON.stringify({theme,soundEnabled})); });
      
      newTaskInput.addEventListener('keydown', e=>{ if(e.key==='Enter'&&(e.ctrlKey||e.metaKey)) addTask(newTaskInput.value); if(e.key==='Escape') newTaskInput.value=''; });
      
      // PWA service worker dummy
      if('serviceWorker' in navigator) navigator.serviceWorker.register("data:application/javascript,self.addEventListener('fetch',()=>{});");
    }
    init();
  })();
</script>
</body>
</html>
